<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Página en GitHub Pages</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f0f0f 0%, #181818 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 22px 16px;
      background: #202020;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
      text-align: center;
    }

    .card {
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    p {
      color: #b5b5b5;
      line-height: 1.6;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      background: #ff0000;
    }

    .btn:hover {
      background: #cc0000;
    }

    .secondary {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      background: #2c2c2c;
      border: 1px solid #444;
    }

    .secondary:hover {
      background: #3a3a3a;
    }

    .small {
      margin-top: 12px;
      font-size: .85rem;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mi Página Web</h1>
  </header>

  <main class="container">
    <section class="card">
      <h2>Acceso a YouTube</h2>
      <p>El video embebido puede bloquearse en algunos casos. Esta versión abre YouTube completo en otra pestaña.</p>

      <a class="btn" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">
        Abrir YouTube
      </a>

      <br />

      <a class="secondary" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" rel="noopener noreferrer">
        Abrir un video
      </a>

      <div class="small">Cambia el enlace por el video que quieras.</div>
    </section>
  </main>
</body>
</html>
